# ARAG Configuration Example 
# API credentials should be set via environment variables: 
#   ARAG_API_KEY, ARAG_BASE_URL, ARAG_MODEL 

llm:
  # Model settings (can override env vars)
  model: "qwen3.5-plus"
  api_key: here your api key
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  temperature: 0.0
  max_tokens: 16384
  reasoning_effort: "medium"  # For reasoning models (o1, etc.)

embedding:
  # HuggingFace model name or local model path
  # We use Qwen3-Embedding-0.6B in our paper
  model: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/models/Qwen3-Embedding-0.6B"
  # model: "/path/to/local/Qwen3-Embedding-0.6B"
  device: "cuda:0"  # or "cpu"
  batch_size: 16


agent:
  max_loops: 15
  max_token_budget: 128000
  verbose: false


data:
  chunks_file: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/dataset/2wikimultihop/chunks.json"
  questions_file: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/dataset/2wikimultihop/questions.json"
  index_dir: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/dataset/2wikimultihop/index"

output:
  results_dir: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/results/"


# ... existing config ...

eval:
  predictions_file: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/results/predictions.jsonl" # 预测结果文件路径
  output_dir: "C:/Users/sunguoyou/PycharmProjects/ADI_RAG_2/results/" # 评估结果输出目录
  max_workers: 10 # 并行线程数
